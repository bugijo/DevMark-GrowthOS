name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose:
    name: Compose e contratos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepara configuração local não sensível
        run: cp .env.example .env
      - name: Valida Docker Compose
        run: docker compose config --quiet
      - name: Valida contratos JSON e scripts
        run: |
          python -m json.tool shared/contracts/worker-job-v1.schema.json >/dev/null
          find scripts -maxdepth 1 -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n

  backend-worker:
    name: Backend e worker
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: growthos_test
          POSTGRES_USER: growthos_test
          POSTGRES_PASSWORD: growthos_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U growthos_test -d growthos_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: test
      AI_PROVIDER: mock
      EMAIL_PROVIDER: console
      DATABASE_URL: postgresql+psycopg://growthos_test:growthos_test_password@127.0.0.1:5432/growthos_test
      AUTH_SECRET_KEY: ci-only-auth-key-not-valid-outside-tests-123456789
      DEMO_CLIENT_PASSWORD: local-demo-client-only-change-before-use
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/pyproject.toml
            worker/pyproject.toml
      - name: Instala backend e worker
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e './backend[dev]' -e './worker[dev]'
      - name: Auditoria de dependências Python
        run: |
          python -m pip install pip-audit
          pip-audit --local --skip-editable
      - name: Ruff
        run: |
          ruff check backend worker
          ruff format --check backend worker
      - name: mypy backend
        run: mypy --config-file backend/pyproject.toml backend/growthos
      - name: mypy worker
        run: mypy --config-file worker/pyproject.toml worker/src/growthos_worker
      - name: Aplica migrations desde banco vazio
        working-directory: backend
        run: alembic upgrade head
      - name: Testa backend
        run: pytest backend/tests
      - name: Testa worker
        run: pytest worker/tests

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: /api/v1
      BACKEND_INTERNAL_URL: http://127.0.0.1:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Instala dependências
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Tipos
        working-directory: frontend
        run: npm run typecheck
      - name: Testes
        working-directory: frontend
        run: npm test
      - name: Auditoria de dependências do frontend
        working-directory: frontend
        run: npm audit --audit-level=high
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Valida suíte E2E
        working-directory: tests/e2e
        run: |
          npm ci
          npm audit --audit-level=high
          npm run typecheck

  e2e:
    name: Fluxo vertical E2E
    needs: [compose, backend-worker, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Prepara configuração mock
        run: cp .env.example .env
      - name: Sobe aplicação e executa Playwright
        run: ./scripts/run-e2e.sh
      - name: Logs em caso de falha
        if: failure()
        run: docker compose logs --no-color backend worker frontend postgres
      - name: Encerra serviços
        if: always()
        run: docker compose --profile test down -v --remove-orphans
